# netlify.toml — Configuración de despliegue para Netlify
# No requiere build step (sitio estático puro)

[build]
  publish = "."   # raíz del proyecto

# ── Headers de seguridad ───────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    Cache-Control          = "public, max-age=3600"

# Caché agresivo para assets estáticos
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirects ─────────────────────────────────────────────
# Redirigir HTTP → HTTPS (Netlify lo hace automáticamente,
# pero se deja explícito):
[[redirects]]
  from   = "http://tudominio.com/*"
  to     = "https://tudominio.com/:splat"
  status = 301
  force  = true
